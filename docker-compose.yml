version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: net-sentry-backend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      GIN_MODE: "release"
      DATABASE_URL: "${DATABASE_URL}"
      HTTP_READ_TIMEOUT_SEC: "10"
      HTTP_WRITE_TIMEOUT_SEC: "10"
      HTTP_SHUTDOWN_TIMEOUT_SEC: "10"
      ALERT_LATENCY_MS_THRESHOLD: "150"
      ALERT_PACKET_LOSS_THRESHOLD: "5"

  frontend:
    build:
      context: ./frontend
    container_name: net-sentry-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8080/api/v1"
      NEXT_PUBLIC_WS_URL: "ws://localhost:8080/ws"
    depends_on:
      - backend